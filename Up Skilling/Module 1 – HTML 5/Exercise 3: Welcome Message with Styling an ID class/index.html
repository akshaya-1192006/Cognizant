<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Message</title>

    <style>
        /* ID Selector */
        #welcomeBanner{
            background-color:#0d6efd;
            color:white;
            padding:20px;
            text-align:center;
            border-radius:8px;
            font-family:Arial,sans-serif;
        }
        /* Class Selector */
        .highlight{
            background-color:yellow;
            font-weight:bold;
            padding:3px;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        <h1>Welcome, Akshaya!</h1>
        <p>
            Thank you for visiting the
            <span class="highlight">Local Community Event Portal</span>.
        </p>
        <p>
            <span style="color:red; font-weight:bold;">
                Special Offer: Register today and get free event passes!
            </span>
        </p>
    </div>
</body>

</html>
