<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Structure</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-primary">Bootstrap Folder Structure</h2>

    <table class="table table-bordered mt-4">

        <thead class="table-dark">
            <tr>
                <th>Folder</th>
                <th>Purpose</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>css</td>
                <td>Contains Bootstrap CSS files for styling web pages.</td>
            </tr>

            <tr>
                <td>js</td>
                <td>Contains Bootstrap JavaScript files for interactive components.</td>
            </tr>

            <tr>
                <td>icons</td>
                <td>Contains Bootstrap Icons used in web applications.</td>
            </tr>
        </tbody>

    </table>

</div>

<script src="js/bootstrap.bundle.min.js"></script>

</body>
</html>
